<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Page</title>

    <style>
        body{
            font-family:Arial, Helvetica, sans-serif;
            background:#f5f5f5;
            text-align:center;
        }

        .container{
            width:500px;
            margin:50px auto;
            background:white;
            padding:30px;
            border-radius:10px;
            box-shadow:0px 0px 10px gray;
        }

        img{
            width:250px;
            margin-top:20px;
        }

        button{
            background:#28a745;
            color:white;
            border:none;
            padding:15px 30px;
            font-size:18px;
            border-radius:5px;
            cursor:pointer;
            margin-top:20px;
        }

        button:hover{
            background:#218838;
        }
    </style>

</head>
<body>

<div class="container">

<h1>Prachi Expert</h1>

<h2>Software Engineer</h2>

<h3>Scan QR Code & Complete Payment</h3>

<img src="{{ url_for('static', filename='image.png') }}" alt="UPI QR">

<br>

<a href="/success">
    <button>I've Paid</button>
</a>

</div>

</body>
</html>
